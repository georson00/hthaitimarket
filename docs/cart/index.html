<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HT Haiti Market | Cart</title>

    <link rel="stylesheet" href="/hthaitimarket/css/style.css">

    <script src="../js/cart.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="products">
        <h2>My Cart</h2>

        <ul class="product-list cart-list">
          <template id="cart-item-template">
            <li class="cart-card divider">
              <a href="#" class="cart-card__image">
                <img src="" alt="" />
              </a>
              <a href="#">
                <h2 class="card__name"></h2>
              </a>
              <p class="cart-card__color"></p>
              <p class="cart-card__quantity"></p>
              <p class="cart-card__price"></p>
              <button
                class="cart-card__remove"
                data-id=""
                title="Remove from cart"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  width="20"
                  height="20"
                >
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path
                    d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"
                  ></path>
                  <line x1="10" y1="11" x2="10" y2="17"></line>
                  <line x1="14" y1="11" x2="14" y2="17"></line>
                </svg>
              </button>
            </li>
          </template>
        </ul>
      </section>
      <div class="cart-footer hide">
        <p class="cart-total">Total:</p>
        <a href="/checkout/index.html" class="checkout-button"
          >Proceed to Checkout</a
        >
      </div>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
