<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>HT Haiti Market | Checkout</title>

    <link rel="stylesheet" href="/hthaitimarket/css/style.css">

    <script src="../js/checkout.js" type="module"></script>
  </head>

  <body>
    <header class="divider" id="main-header"></header>

    <main class="divider">
      <section class="products checkout">
        <h2>Review &amp; Place your Order</h2>

        <div class="checkout-layout">
          <form id="checkout-form" class="checkout-form" novalidate>
            <fieldset class="checkout-fieldset">
              <legend>Customer Name</legend>
              <label for="first-name">First Name</label>
              <input
                type="text"
                id="first-name"
                name="fname"
                required
                autocomplete="given-name"
              />
              <label for="last-name">Last Name</label>
              <input
                type="text"
                id="last-name"
                name="lname"
                required
                autocomplete="family-name"
              />
            </fieldset>

            <fieldset class="checkout-fieldset">
              <legend>Address</legend>
              <label for="street">Street Address</label>
              <input
                type="text"
                id="street"
                name="street"
                required
                autocomplete="street-address"
              />
              <label for="city">City</label>
              <input
                type="text"
                id="city"
                name="city"
                required
                autocomplete="address-level2"
              />
              <label for="state">State</label>
              <input
                type="text"
                id="state"
                name="state"
                required
                autocomplete="address-level1"
                maxlength="2"
                placeholder="UT"
              />
              <label for="zip">Zip Code</label>
              <input
                type="text"
                id="zip"
                name="zip"
                required
                autocomplete="postal-code"
                pattern="[0-9]{5}"
                maxlength="5"
                inputmode="numeric"
              />
            </fieldset>

            <fieldset class="checkout-fieldset">
              <legend>Payment</legend>
              <label for="card-number">Credit Card Number</label>
              <!-- Use the hardcode cardnumber as this is what the backend expects -->
              <input
                type="text"
                id="card-number"
                name="cardNumber"
                required
                inputmode="numeric"
                autocomplete="cc-number"
                maxlength="19"
                value="1234123412341234"
              />
              <label for="card-expiry">Expiration Date</label>
              <input
                type="text"
                id="card-expiry"
                name="expiration"
                required
                placeholder="MM/YY"
                autocomplete="cc-exp"
                maxlength="5"
              />
              <label for="card-cvv">Security Code</label>
              <input
                type="text"
                id="card-cvv"
                name="code"
                required
                inputmode="numeric"
                autocomplete="cc-csc"
                maxlength="4"
              />
            </fieldset>

            <p
              id="checkout-form-message"
              class="checkout-form-message hide"
              role="alert"
            ></p>

            <button type="submit" id="checkout-submit" disabled>
              Place order
            </button>
          </form>

          <aside class="order-summary" aria-labelledby="order-summary-heading">
            <h3 id="order-summary-heading">Order Summary</h3>
            <dl class="order-summary__list">
              <div class="order-summary__row">
                <dt>Subtotal</dt>
                <dd id="summary-subtotal">$0.00</dd>
              </div>
              <div class="order-summary__row">
                <dt>Tax</dt>
                <dd id="summary-tax">$0.00</dd>
              </div>
              <div class="order-summary__row">
                <dt>Shipping Estimate</dt>
                <dd id="summary-shipping">$0.00</dd>
              </div>
              <div class="order-summary__row order-summary__row--total">
                <dt>Order Total</dt>
                <dd id="summary-total">$0.00</dd>
              </div>
            </dl>
          </aside>
        </div>
      </section>
    </main>

    <footer id="main-footer"></footer>
  </body>
</html>
